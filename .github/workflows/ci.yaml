name: Continuous Integration

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev]

jobs:
  # --- BACKEND ---
  backend-ci:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        env:
          DB_CONNECTION_STRING: ${{ secrets.DB_TEST_CONNECTION_STRING }}
        run: dotnet test --configuration Release --no-build --verbosity normal

  # --- FRONTEND ---
  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Front-end/src
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './Front-end/src/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build Next.js
        run: npm run build

  # --- SECURITY SCANNER ---
  sonarqube:
    needs: [backend-ci]
    uses: ./.github/workflows/sonar-analysis.yml
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      DB_CONNECTION_STRING: ${{ secrets.DB_TEST_CONNECTION_STRING }}